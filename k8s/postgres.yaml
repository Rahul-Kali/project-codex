apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: opspulse
type: Opaque
stringData:
  POSTGRES_DB: opspulse
  POSTGRES_USER: opspulse
  POSTGRES_PASSWORD: opspulse
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: opspulse
data:
  001_schema.sql: |
    CREATE TABLE IF NOT EXISTS tasks (
      id SERIAL PRIMARY KEY,
      title TEXT NOT NULL,
      owner TEXT NOT NULL,
      priority TEXT NOT NULL CHECK (priority IN ('low', 'medium', 'high', 'critical')),
      status TEXT NOT NULL DEFAULT 'queued' CHECK (status IN ('queued', 'running', 'blocked', 'done')),
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
      updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE TABLE IF NOT EXISTS incidents (
      id SERIAL PRIMARY KEY,
      service_name TEXT NOT NULL,
      severity TEXT NOT NULL CHECK (severity IN ('sev1', 'sev2', 'sev3')),
      status TEXT NOT NULL DEFAULT 'open' CHECK (status IN ('open', 'mitigated', 'closed')),
      started_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
      resolved_at TIMESTAMPTZ
    );
  002_seed.sql: |
    INSERT INTO tasks (title, owner, priority, status) VALUES
      ('Ship checkout tracing', 'Platform', 'high', 'running'),
      ('Patch billing worker', 'Payments', 'critical', 'queued'),
      ('Tune dashboard queries', 'Data', 'medium', 'blocked'),
      ('Verify backup restore', 'SRE', 'high', 'done')
    ON CONFLICT DO NOTHING;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: opspulse
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: opspulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: postgres-secret
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "opspulse", "-d", "opspulse"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: opspulse
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

